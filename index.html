<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Dojo — ブラインドタッチ練習</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg:           #080b14;
  --bg2:          #0d1120;
  --surface:      rgba(255,255,255,0.04);
  --surface-high: rgba(255,255,255,0.07);
  --border:       rgba(255,255,255,0.08);
  --border-hi:    rgba(255,255,255,0.16);
  --text:         #e8eaf6;
  --muted:        #5c6380;
  --accent:       #818cf8;
  --accent2:      #a78bfa;
  --glow:         rgba(129,140,248,0.35);

  --pinky:   #f87171;
  --ring:    #fb923c;
  --middle:  #fbbf24;
  --index:   #34d399;
  --thumb:   #60a5fa;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 64px;
  overflow-x: hidden;
}

/* ── Background decoration ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(99,102,241,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(167,139,250,0.10) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body > * { position: relative; z-index: 1; }

/* ── Header ── */
header {
  width: 100%;
  max-width: 820px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 0 20px var(--glow);
}
.logo-text {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-sub { color: var(--text); font-weight: 800; }

.header-hint {
  font-size: 0.78rem;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
}

/* ── Lesson tabs ── */
.tabs-wrap {
  width: 100%;
  max-width: 820px;
  margin-bottom: 28px;
}
.tabs-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 600;
}
.tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tab {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 0.83rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  user-select: none;
  font-family: 'Inter', sans-serif;
}
.tab:hover {
  border-color: var(--border-hi);
  color: var(--text);
  background: var(--surface-high);
}
.tab.active {
  background: linear-gradient(135deg, rgba(129,140,248,0.2), rgba(167,139,250,0.2));
  border-color: rgba(129,140,248,0.5);
  color: var(--accent);
  font-weight: 600;
  box-shadow: 0 0 14px rgba(129,140,248,0.15);
}

/* ── Stats cards ── */
.stats {
  width: 100%;
  max-width: 820px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: border-color 0.2s;
}
.stat-card.active { border-color: rgba(129,140,248,0.3); }
.stat-icon { font-size: 0.95rem; margin-bottom: 2px; }
.stat-val {
  font-size: 2rem;
  font-weight: 800;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  font-family: 'JetBrains Mono', monospace;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-lbl {
  font-size: 0.68rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
}

/* ── Progress bar ── */
.progress-wrap {
  width: 100%;
  max-width: 820px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--surface-high);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  transition: width 0.15s ease;
  box-shadow: 0 0 8px var(--glow);
}
.progress-pct {
  font-size: 0.72rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  width: 32px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Typing card ── */
.typing-card {
  width: 100%;
  max-width: 820px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 36px 40px 28px;
  margin-bottom: 12px;
  cursor: text;
  position: relative;
  transition: border-color 0.2s, box-shadow 0.2s;
  backdrop-filter: blur(4px);
}
.typing-card:focus-within {
  border-color: rgba(129,140,248,0.4);
  box-shadow: 0 0 0 3px rgba(129,140,248,0.08), 0 8px 32px rgba(0,0,0,0.3);
}
.typing-card-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 16px;
}

#text-display {
  font-family: 'JetBrains Mono', 'Consolas', monospace;
  font-size: 1.45rem;
  line-height: 2.3;
  letter-spacing: 0.03em;
  word-break: break-all;
  user-select: none;
  min-height: 72px;
}

.char { position: relative; transition: color 0.08s; }
.char.correct { color: rgba(129,140,248,0.45); }
.char.incorrect {
  color: #f87171;
  background: rgba(248,113,113,0.12);
  border-radius: 3px;
  text-decoration: underline;
  text-decoration-color: rgba(248,113,113,0.5);
}
.char.cursor { position: relative; }
.char.cursor::before {
  content: '';
  position: absolute;
  left: -1px;
  top: 6px;
  bottom: 6px;
  width: 2px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  border-radius: 2px;
  animation: blink 1s step-end infinite;
  box-shadow: 0 0 6px var(--glow);
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* hint */
.hint-row {
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 0.83rem;
  color: var(--muted);
  min-height: 28px;
}
.hint-key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-high);
  border: 1px solid var(--border-hi);
  border-radius: 6px;
  padding: 2px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: 700;
  box-shadow: 0 2px 0 rgba(0,0,0,0.3);
}
.hint-arrow { color: var(--muted); }
.hint-finger {
  font-weight: 600;
  color: var(--text);
  background: var(--surface-high);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 10px;
  font-size: 0.8rem;
}

/* error flash */
.typing-card.error-flash {
  animation: errflash 0.2s ease;
}
@keyframes errflash {
  0%   { box-shadow: 0 0 0 3px rgba(248,113,113,0.0); }
  40%  { box-shadow: 0 0 0 3px rgba(248,113,113,0.25); }
  100% { box-shadow: 0 0 0 3px rgba(248,113,113,0.0); }
}

/* ── Keyboard ── */
.keyboard-wrap {
  width: 100%;
  max-width: 820px;
  margin-bottom: 20px;
}
.keyboard-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px 20px 20px;
  backdrop-filter: blur(4px);
}
.keyboard {
  display: flex;
  flex-direction: column;
  gap: 7px;
  align-items: center;
}
.kb-row { display: flex; gap: 6px; }

.key {
  width: 48px;
  height: 48px;
  border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.1);
  border-bottom: 3px solid rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  background: linear-gradient(180deg, #1e2235 0%, #181b2c 100%);
  transition: all 0.12s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  user-select: none;
  cursor: default;
}
.key.space {
  width: 260px;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.15em;
}

/* finger dot */
.key::after {
  content: '';
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  opacity: 0.7;
}
.f-pinky::after  { background: var(--pinky); }
.f-ring::after   { background: var(--ring); }
.f-middle::after { background: var(--middle); }
.f-index::after  { background: var(--index); }
.f-thumb::after  { background: var(--thumb); }

/* active key */
.key.active {
  transform: translateY(-4px) scale(1.1);
  border-bottom-width: 1px;
  z-index: 2;
}
.key.active.f-pinky  { background: linear-gradient(135deg,rgba(248,113,113,0.25),rgba(248,113,113,0.1)); border-color: var(--pinky); color: var(--pinky); box-shadow: 0 0 18px rgba(248,113,113,0.4), 0 4px 12px rgba(0,0,0,0.3); }
.key.active.f-ring   { background: linear-gradient(135deg,rgba(251,146,60,0.25),rgba(251,146,60,0.1)); border-color: var(--ring); color: var(--ring); box-shadow: 0 0 18px rgba(251,146,60,0.4), 0 4px 12px rgba(0,0,0,0.3); }
.key.active.f-middle { background: linear-gradient(135deg,rgba(251,191,36,0.25),rgba(251,191,36,0.1)); border-color: var(--middle); color: var(--middle); box-shadow: 0 0 18px rgba(251,191,36,0.4), 0 4px 12px rgba(0,0,0,0.3); }
.key.active.f-index  { background: linear-gradient(135deg,rgba(52,211,153,0.25),rgba(52,211,153,0.1)); border-color: var(--index); color: var(--index); box-shadow: 0 0 18px rgba(52,211,153,0.4), 0 4px 12px rgba(0,0,0,0.3); }
.key.active.f-thumb  { background: linear-gradient(135deg,rgba(96,165,250,0.25),rgba(96,165,250,0.1)); border-color: var(--thumb); color: var(--thumb); box-shadow: 0 0 18px rgba(96,165,250,0.4), 0 4px 12px rgba(0,0,0,0.3); }

/* legend */
.legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: var(--muted);
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal-overlay.show { display: flex; animation: fadein 0.2s ease; }
@keyframes fadein { from { opacity:0; } to { opacity:1; } }

.modal {
  background: #0f1220;
  border: 1px solid rgba(129,140,248,0.25);
  border-radius: 24px;
  padding: 48px 52px;
  text-align: center;
  max-width: 440px;
  width: 92%;
  box-shadow: 0 0 60px rgba(129,140,248,0.15), 0 32px 64px rgba(0,0,0,0.5);
  animation: popup 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popup { from { transform:scale(0.85); opacity:0; } to { transform:scale(1); opacity:1; } }

.modal-emoji { font-size: 3rem; margin-bottom: 12px; display: block; }
.modal h2 {
  font-size: 1.7rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.modal-sub { color: var(--muted); font-size: 0.85rem; }

.modal-stats {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 28px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.modal-stat {
  flex: 1;
  padding: 18px 12px;
  border-right: 1px solid var(--border);
}
.modal-stat:last-child { border-right: none; }
.modal-stat-val {
  font-size: 2rem;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 4px;
}
.modal-stat-lbl {
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
}

.btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 4px; }
.btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 11px 28px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
  font-family: 'Inter', sans-serif;
  box-shadow: 0 4px 16px var(--glow);
}
.btn:hover { opacity: 0.88; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-ghost {
  background: var(--surface-high);
  color: var(--muted);
  border: 1px solid var(--border);
  box-shadow: none;
}
.btn-ghost:hover { color: var(--text); border-color: var(--border-hi); }

/* hidden input */
#hidden-input {
  position: absolute;
  opacity: 0;
  width: 0; height: 0;
  pointer-events: none;
}

/* ── Footer ── */
footer {
  margin-top: auto;
  padding-top: 40px;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">⌨️</div>
    <span class="logo-text">Typing</span><span class="logo-sub">Dojo</span>
  </div>
  <div class="header-hint">クリックして練習スタート</div>
</header>

<!-- Lesson tabs -->
<div class="tabs-wrap">
  <div class="tabs-label">レッスン選択</div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-lesson="homerow">🏠 ホームポジション</div>
    <div class="tab" data-lesson="toprow">⬆️ 上段</div>
    <div class="tab" data-lesson="bottomrow">⬇️ 下段</div>
    <div class="tab" data-lesson="words">📝 単語</div>
    <div class="tab" data-lesson="sentences">💬 文章</div>
  </div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat-card" id="stat-wpm">
    <div class="stat-icon">⚡</div>
    <div class="stat-val" id="wpm">—</div>
    <div class="stat-lbl">WPM</div>
  </div>
  <div class="stat-card" id="stat-acc">
    <div class="stat-icon">🎯</div>
    <div class="stat-val" id="acc">—</div>
    <div class="stat-lbl">精度</div>
  </div>
  <div class="stat-card" id="stat-time">
    <div class="stat-icon">⏱</div>
    <div class="stat-val" id="timer">0:00</div>
    <div class="stat-lbl">タイム</div>
  </div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <div class="progress-pct" id="progress-pct">0%</div>
</div>

<!-- Typing area -->
<div class="typing-card" id="typing-card" tabindex="0">
  <div class="typing-card-label">入力エリア</div>
  <div id="text-display"></div>
  <div class="hint-row" id="hint-row">クリックして練習を開始</div>
  <input id="hidden-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>

<!-- Keyboard -->
<div class="keyboard-wrap">
  <div class="keyboard-card">
    <div class="keyboard" id="keyboard"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--pinky);color:var(--pinky)"></div>小指</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--ring);color:var(--ring)"></div>薬指</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--middle);color:var(--middle)"></div>中指</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--index);color:var(--index)"></div>人差し指</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--thumb);color:var(--thumb)"></div>親指</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <span class="modal-emoji">🎉</span>
    <h2>レッスン完了！</h2>
    <p class="modal-sub">お疲れ様でした</p>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-wpm">—</div>
        <div class="modal-stat-lbl">WPM</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-acc">—</div>
        <div class="modal-stat-lbl">精度</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-time">—</div>
        <div class="modal-stat-lbl">タイム</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-retry">もう一度</button>
      <button class="btn btn-ghost" id="btn-next">次のレッスン →</button>
    </div>
  </div>
</div>

<footer>TypingDojo — ブラインドタッチ練習アプリ</footer>

<script>
const LESSONS = {
  homerow:   "asdf jkl; asdf jkl; fjfj dkdk slsl a;a; fds jkl fdsa jkl; asdfjkl; fjdk slal",
  toprow:    "qwert yuiop qwert yuiop try your power quit we type row top",
  bottomrow: "zxcv bnm zxcv bnm buzz mix van box cab next zinc",
  words:     "the quick brown fox jumps over the lazy dog pack my box with five dozen liquor jugs",
  sentences: "Practice makes perfect. Keep your eyes off the keyboard. Use all ten fingers. Type without looking."
};
const LESSON_ORDER = ["homerow","toprow","bottomrow","words","sentences"];

const ROWS = [
  [],
  [['q','f-pinky'],['w','f-ring'],['e','f-middle'],['r','f-index'],['t','f-index'],
   ['y','f-index'],['u','f-index'],['i','f-middle'],['o','f-ring'],['p','f-pinky']],
  [['a','f-pinky'],['s','f-ring'],['d','f-middle'],['f','f-index'],['g','f-index'],
   ['h','f-index'],['j','f-index'],['k','f-middle'],['l','f-ring'],[';','f-pinky']],
  [['z','f-pinky'],['x','f-ring'],['c','f-middle'],['v','f-index'],['b','f-index'],
   ['n','f-index'],['m','f-index'],[',','f-middle'],['.','f-ring'],['/','f-pinky']]
];

const FINGER_NAMES = {
  'f-pinky':  { left:'左小指',   right:'右小指' },
  'f-ring':   { left:'左薬指',   right:'右薬指' },
  'f-middle': { left:'左中指',   right:'右中指' },
  'f-index':  { left:'左人差し指', right:'右人差し指' },
  'f-thumb':  { left:'左親指',   right:'右親指' }
};

const keyMap = {};

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ROWS.forEach((row, ri) => {
    if (!row.length) return;
    const rowEl = document.createElement('div');
    rowEl.className = 'kb-row';
    if (ri === 2) rowEl.style.marginLeft = '24px';
    if (ri === 3) rowEl.style.marginLeft = '44px';
    row.forEach(([label, finger]) => {
      const k = document.createElement('div');
      k.className = `key ${finger}`;
      k.textContent = label.toUpperCase();
      k.dataset.key = label;
      rowEl.appendChild(k);
      const side = 'qwertasdfgzxcvb'.includes(label) ? 'left' : 'right';
      keyMap[label] = { el: k, finger, side };
    });
    kb.appendChild(rowEl);
  });
  const spaceRow = document.createElement('div');
  spaceRow.className = 'kb-row';
  spaceRow.style.marginLeft = '80px';
  const spaceKey = document.createElement('div');
  spaceKey.className = 'key space f-thumb';
  spaceKey.textContent = 'SPACE';
  spaceKey.dataset.key = ' ';
  spaceRow.appendChild(spaceKey);
  kb.appendChild(spaceRow);
  keyMap[' '] = { el: spaceKey, finger: 'f-thumb', side: 'left' };
}

let currentLesson = 'homerow';
let text = '', pos = 0, errors = 0, totalTyped = 0;
let startTime = null, timerInterval = null, activeKeyEl = null;

function loadLesson(name) {
  currentLesson = name;
  text = LESSONS[name];
  pos = 0; errors = 0; totalTyped = 0; startTime = null;
  clearInterval(timerInterval);
  document.getElementById('wpm').textContent = '—';
  document.getElementById('acc').textContent = '—';
  document.getElementById('timer').textContent = '0:00';
  updateProgress();
  renderText();
  highlightNextKey();
  updateHint();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.lesson === name));
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
}

function renderText() {
  const d = document.getElementById('text-display');
  d.innerHTML = '';
  for (let i = 0; i < text.length; i++) {
    const s = document.createElement('span');
    s.className = 'char' + (i < pos ? ' correct' : i === pos ? ' cursor' : '');
    s.textContent = text[i];
    s.dataset.i = i;
    d.appendChild(s);
  }
}

function updateCharAt(i, cls) {
  const s = document.querySelector(`.char[data-i="${i}"]`);
  if (s) s.className = 'char ' + cls;
}

function highlightNextKey() {
  if (activeKeyEl) activeKeyEl.classList.remove('active');
  activeKeyEl = null;
  if (pos >= text.length) return;
  const ch = text[pos].toLowerCase();
  if (keyMap[ch]) { activeKeyEl = keyMap[ch].el; activeKeyEl.classList.add('active'); }
}

function updateHint() {
  const hint = document.getElementById('hint-row');
  if (pos >= text.length) { hint.innerHTML = ''; return; }
  const ch = text[pos];
  if (ch === ' ') {
    hint.innerHTML = `次のキー: <span class="hint-key">Space</span> <span class="hint-arrow">→</span> <span class="hint-finger">親指</span>`;
    return;
  }
  const info = keyMap[ch.toLowerCase()];
  if (!info) { hint.textContent = ''; return; }
  const fn = FINGER_NAMES[info.finger]?.[info.side] || info.finger;
  hint.innerHTML = `次のキー: <span class="hint-key">${ch.toUpperCase()}</span> <span class="hint-arrow">→</span> <span class="hint-finger">${fn}</span>`;
}

function updateProgress() {
  const pct = text.length ? Math.round((pos / text.length) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

document.getElementById('typing-card').addEventListener('click', () => {
  document.getElementById('hidden-input').focus();
});

document.getElementById('hidden-input').addEventListener('keydown', e => {
  if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); return; }
  if (pos >= text.length) return;

  if (!startTime) {
    startTime = Date.now();
    timerInterval = setInterval(updateTimerDisplay, 250);
    document.querySelectorAll('.stat-card').forEach(c => c.classList.add('active'));
  }

  totalTyped++;

  if (e.key === text[pos]) {
    updateCharAt(pos, 'correct');
    pos++;
    if (pos < text.length) updateCharAt(pos, 'cursor');
    updateStats();
    updateProgress();
    highlightNextKey();
    updateHint();
    if (pos === text.length) { clearInterval(timerInterval); setTimeout(showModal, 350); }
  } else {
    errors++;
    const card = document.getElementById('typing-card');
    card.classList.remove('error-flash');
    void card.offsetWidth;
    card.classList.add('error-flash');
    updateStats();
  }
  e.preventDefault();
});

function updateStats() {
  if (!startTime) return;
  const elapsed = (Date.now() - startTime) / 60000;
  const wpm = elapsed > 0 ? Math.round((pos / 5) / elapsed) : 0;
  const acc = totalTyped > 0 ? Math.round(((totalTyped - errors) / totalTyped) * 100) : 100;
  document.getElementById('wpm').textContent = wpm;
  document.getElementById('acc').textContent = acc + '%';
}

function updateTimerDisplay() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('timer').textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

function getStats() {
  const elapsed = startTime ? (Date.now() - startTime) / 1000 : 0;
  const wpm = elapsed > 0 ? Math.round((pos / 5) / (elapsed / 60)) : 0;
  const acc = totalTyped > 0 ? Math.round(((totalTyped - errors) / totalTyped) * 100) : 100;
  const s = Math.floor(elapsed);
  return { wpm, acc, time: `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}` };
}

function showModal() {
  const { wpm, acc, time } = getStats();
  document.getElementById('m-wpm').textContent = wpm;
  document.getElementById('m-acc').textContent = acc + '%';
  document.getElementById('m-time').textContent = time;
  document.getElementById('modal').classList.add('show');
}

document.getElementById('btn-retry').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('show');
  loadLesson(currentLesson);
  document.getElementById('hidden-input').focus();
});

document.getElementById('btn-next').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('show');
  const next = LESSON_ORDER[(LESSON_ORDER.indexOf(currentLesson) + 1) % LESSON_ORDER.length];
  loadLesson(next);
  document.getElementById('hidden-input').focus();
});

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  loadLesson(tab.dataset.lesson);
  document.getElementById('hidden-input').focus();
});

buildKeyboard();
loadLesson('homerow');
</script>
</body>
</html>
